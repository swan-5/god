<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="apple-touch-icon" href="chichi.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>갓생 가든 Pro ☁️</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root {
            --bg-color: #F8FAFC;
            --text-main: #1E293B;
            --point-blue: #7ab2f6;
            --grass-0: #FFFFFF;
            --grass-1: #DBEAFE;
            --grass-2: #93C5FD;
            --grass-3: #5492f5;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Pretendard', sans-serif; background: var(--bg-color); color: var(--text-main); overflow: hidden; }

        /* 메인 캘린더 페이지 */
        .page { width: 100%; height: 100%; display: flex; flex-direction: column; overflow: hidden; position: relative; }

        header { padding: 40px 20px 10px; display: flex; justify-content: space-between; align-items: center; background: white; flex-shrink: 0; }
        header h2 { margin: 0; font-size: 1.1rem; font-weight: 800; }
        .nav-btn { background: none; border: none; font-size: 1.1rem; cursor: pointer; color: var(--point-blue); padding: 5px; }

        /* 캘린더 스타일 */
        .calendar-section { background: white; padding-bottom: 20px; border-bottom: 1px solid #f1f5f9; flex-shrink: 0; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); padding: 0 10px; }
        .day-label { padding: 8px 0; font-size: 0.65rem; text-align: center; font-weight: 700; color: #94a3b8; }
        .days-container { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; padding: 0 10px; }
        .day { 
            aspect-ratio: 1 / 1.3; border-radius: 8px; border: 1px solid #f8fafc;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            padding-top: 5px; font-size: 0.75rem; cursor: pointer; transition: 0.2s; overflow: hidden;
        }
        .day.selected { border: 1.5px solid var(--text-main) !important; }
        .day.drag-over { background-color: var(--grass-1) !important; transform: scale(1.05); border: 2px dashed var(--point-blue); }

        .day-todo-list { width: 100%; padding: 2px; display: flex; flex-direction: column; gap: 2px; margin-top: 3px; }
        .day-todo-item { 
            font-size: 0.5rem; border-radius: 2px; padding: 1px 3px; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
            color: white; font-weight: 600; line-height: 1.2;
        }
        .day-todo-item.done { opacity: 0.4; text-decoration: line-through; }

        /* --- 전체 화면 업적 섹션 --- */
        .full-todo-page {
            position: fixed; top: 100%; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 1000;
            transition: top 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex; flex-direction: column;
        }
        .full-todo-page.active { top: 0; }

        .todo-header {
            background: white; padding: 50px 20px 20px; flex-shrink: 0;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #f1f5f9;
        }
        .todo-header h3 { margin: 0; font-size: 1.3rem; }
        .close-btn { font-size: 1.5rem; border: none; background: none; color: #94a3b8; cursor: pointer; }

        .todo-content { flex: 1; overflow-y: auto; padding: 20px; }
        
        .cat-bar { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0 20px; }
        .cat-chip { padding: 10px 20px; border-radius: 25px; font-size: 0.9rem; white-space: nowrap; cursor: pointer; transition: 0.2s; font-weight: 600; opacity: 0.6; }
        .cat-chip.active { opacity: 1; color: white !important; transform: scale(1.05); }

        .input-group { display: flex; gap: 8px; margin-bottom: 25px; }
        #todoInput { flex: 1; padding: 15px; border: 1px solid #e2e8f0; border-radius: 15px; outline: none; background: white; font-size: 1rem; }
        #addBtn { background: var(--point-blue); color: white; border: none; width: 55px; border-radius: 15px; font-size: 1.5rem; cursor: pointer; }

        .todo-item { 
            display: flex; align-items: center; gap: 12px; padding: 18px; background: white; 
            border-radius: 18px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); 
            cursor: pointer; font-size: 1rem;
        }
        .todo-item.done { opacity: 0.5; text-decoration: line-through; }
        .cat-title { font-size: 0.85rem; font-weight: 800; color: #94A3B8; margin: 20px 0 10px; display: flex; align-items: center; gap: 8px; }

        /* 액션 시트 */
        .action-sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; z-index: 2000; backdrop-filter: blur(2px); }
        .action-sheet {
            position: fixed; bottom: -100%; left: 0; right: 0; background: #F2F2F7;
            border-radius: 25px 25px 0 0; padding: 20px; transition: bottom 0.3s ease; z-index: 2001;
        }
        .action-sheet.active { bottom: 0; }
        .sheet-header { display: flex; gap: 10px; margin-bottom: 15px; }
        .header-btn { flex: 1; background: white; border-radius: 15px; padding: 15px; border: none; font-weight: 600; font-size: 0.9rem; }
        .action-list { background: white; border-radius: 15px; overflow: hidden; }
        .action-item { padding: 15px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 0.5px solid #F0F0F0; font-weight: 500; }
    </style>
</head>
<body>

<div class="page">
    <header>
        <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
        <h2 id="currentMonthYear"></h2>
        <button class="nav-btn" onclick="changeMonth(1)">▶</button>
    </header>
    <section class="calendar-section">
        <div class="calendar-grid">
            <div class="day-label">S</div><div class="day-label">M</div><div class="day-label">T</div>
            <div class="day-label">W</div><div class="day-label">T</div><div class="day-label">F</div><div class="day-label">S</div>
        </div>
        <div id="calendarDays" class="days-container"></div>
    </section>
    <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#cbd5e1; font-size:0.85rem; padding:20px; text-align:center;">
        웃고 떠들며 <br> 바람을 가르자 ☁️
    </div>
</div>

<div class="full-todo-page" id="fullTodoPage">
    <div class="todo-header">
        <h3 id="todoDateTitle">오늘의 업적</h3>
        <button class="close-btn" onclick="closeTodoPage()">✕</button>
    </div>
    <div class="todo-content">
        <div id="todoDateSubtitle" style="font-weight: 700; color: var(--point-blue); margin-bottom: 15px;"></div>
        <div class="cat-bar" id="catBar"></div>
        <div class="input-group">
            <input type="text" id="todoInput" placeholder="업적 추가" onkeypress="if(event.keyCode==13) addTodo()">
            <button id="addBtn" onclick="addTodo()">+</button>
        </div>
        <div id="todoList"></div>
    </div>
</div>

<div class="action-sheet-overlay" id="actionOverlay" onclick="closeActionSheet()"></div>
<div class="action-sheet" id="actionSheet">
    <div class="sheet-header">
        <button class="header-btn" style="color:#4A90E2;" onclick="handleAction('edit')">수정</button>
        <button class="header-btn" style="color:#FF3B30;" onclick="handleAction('delete')">삭제</button>
    </div>
    <div class="action-list">
        <div class="action-item" onclick="handleAction('tomorrow')">내일하기</div>
        <div class="action-item" id="routineBtn" onclick="handleAction('routine')">루틴 등록</div>
    </div>
</div>

<script>
    const CATEGORIES = [
        {name:'공부', color:'#3D9776'}, {name:'대외활동', color:'#FDCC05'}, {name:'과제', color:'#CC4125'},
        {name:'일', color:'#7AB2F6'}, {name:'놀기', color:'#FF9EB3'}, {name:'기타', color:'#94A3B8'}
    ];

    let currentMonth = new Date();
    let selectedDateKey = "";
    let selectedCatIdx = 0;
    let actionTargetIdx = null;
    let data = JSON.parse(localStorage.getItem('gs_final_pro_v4')) || { todos: {}, routines: [], exceptions: {} };

    function renderCalendar() {
        const year = currentMonth.getFullYear(), month = currentMonth.getMonth();
        document.getElementById('currentMonthYear').innerText = `${year}년 ${month + 1}월`;
        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();
        const daysWrap = document.getElementById('calendarDays');
        daysWrap.innerHTML = '';

        for (let i = 0; i < firstDay; i++) daysWrap.innerHTML += `<div></div>`;
        for (let i = 1; i <= lastDate; i++) {
            const dateKey = `${year}-${month+1}-${i}`;
            const dateObj = new Date(year, month, i);
            const dayOfWeek = dateObj.getDay();
            
            data.routines.forEach(r => {
                if(r.day === dayOfWeek) {
                    const isExcept = data.exceptions[dateKey] && data.exceptions[dateKey].includes(r.id);
                    if(!isExcept) {
                        if(!data.todos[dateKey]) data.todos[dateKey] = [];
                        if(!data.todos[dateKey].find(t => t.routineId === r.id)) {
                            data.todos[dateKey].push({text: r.text, cat: r.cat, done: false, routineId: r.id});
                        }
                    }
                }
            });

            const dayTodos = data.todos[dateKey] || [];
            const doneCount = dayTodos.filter(t => t.done).length;
            const div = document.createElement('div');
            div.className = `day ${dateKey === selectedDateKey ? 'selected' : ''}`;
            div.style.backgroundColor = doneCount >= 3 ? 'var(--grass-2)' : doneCount >= 1 ? 'var(--grass-1)' : 'white';
            
            div.ondragover = e => e.preventDefault();
            div.ondrop = e => {
                const dropData = JSON.parse(e.dataTransfer.getData('todo'));
                moveTodo(dropData.oldKey, dropData.idx, dateKey);
            };

            let todoHtml = '<div class="day-todo-list">';
            dayTodos.slice(0, 3).forEach(t => {
                const c = CATEGORIES.find(cat => cat.name === t.cat) || CATEGORIES[5];
                todoHtml += `<div class="day-todo-item ${t.done ? 'done' : ''}" style="background:${c.color}">${t.text}</div>`;
            });
            todoHtml += '</div>';

            div.innerHTML = `<b>${i}</b>${todoHtml}`;
            div.onclick = () => selectDate(year, month+1, i);
            daysWrap.appendChild(div);
        }
    }

    function selectDate(y, m, d) {
        selectedDateKey = `${y}-${m}-${d}`;
        document.getElementById('todoDateSubtitle').innerText = `할 수 있다능`;
        openTodoPage();
        renderCalendar(); renderCatBar(); renderTodos();
    }

    function openTodoPage() { document.getElementById('fullTodoPage').classList.add('active'); }
    function closeTodoPage() { document.getElementById('fullTodoPage').classList.remove('active'); }

    function renderCatBar() {
        const bar = document.getElementById('catBar'); bar.innerHTML = '';
        CATEGORIES.forEach((c, i) => {
            const chip = document.createElement('div');
            const active = selectedCatIdx === i;
            chip.className = `cat-chip ${active ? 'active' : ''}`;
            chip.innerText = c.name;
            chip.style.backgroundColor = active ? c.color : c.color + '22';
            chip.style.color = active ? 'white' : c.color;
            chip.onclick = () => { selectedCatIdx = i; renderCatBar(); };
            bar.appendChild(chip);
        });
    }

    function renderTodos() {
        const list = document.getElementById('todoList'); list.innerHTML = '';
        const dayTodos = data.todos[selectedDateKey] || [];
        const groups = {};
        dayTodos.forEach((t, idx) => { if(!groups[t.cat]) groups[t.cat] = []; groups[t.cat].push({...t, idx}); });

        CATEGORIES.forEach(cat => {
            if (groups[cat.name]) {
                list.innerHTML += `<div class="cat-title">${cat.name}</div>`;
                groups[cat.name].forEach(t => {
                    const item = document.createElement('div');
                    item.className = `todo-item ${t.done ? 'done' : ''}`;
                    item.draggable = true;
                    item.ondragstart = e => e.dataTransfer.setData('todo', JSON.stringify({oldKey: selectedDateKey, idx: t.idx}));
                    item.onclick = () => openActionSheet(t.idx);
                    item.innerHTML = `<input type="checkbox" ${t.done?'checked':''} onclick="event.stopPropagation(); toggleTodo(${t.idx})"><span style="flex:1">${t.text} ${t.routineId?'(🔄)':''}</span>`;
                    list.appendChild(item);
                });
            }
        });
    }

    function getNumericDate(dateStr) {
        const parts = dateStr.split('-');
        return parseInt(parts[0]) * 10000 + parseInt(parts[1]) * 100 + parseInt(parts[2]);
    }

    function handleAction(type) {
        const currentTodo = data.todos[selectedDateKey][actionTargetIdx];
        const rid = currentTodo.routineId;

        if(type === 'delete') {
            if(rid) {
                const choice = prompt("루틴 삭제 옵션:\n1. 이 날짜만 삭제\n2. 과거/미래 모든 루틴 삭제\n3. 오늘 포함 이후 루틴만 삭제", "1");
                if(choice === "1") {
                    if(!data.exceptions[selectedDateKey]) data.exceptions[selectedDateKey] = [];
                    data.exceptions[selectedDateKey].push(rid);
                    data.todos[selectedDateKey].splice(actionTargetIdx, 1);
                } else if(choice === "2") {
                    data.routines = data.routines.filter(r => r.id !== rid);
                    Object.keys(data.todos).forEach(date => {
                        data.todos[date] = data.todos[date].filter(t => t.routineId !== rid);
                    });
                } else if(choice === "3") {
                    const targetNum = getNumericDate(selectedDateKey);
                    data.routines = data.routines.filter(r => r.id !== rid);
                    Object.keys(data.todos).forEach(date => {
                        if(getNumericDate(date) >= targetNum) {
                            data.todos[date] = data.todos[date].filter(t => t.routineId !== rid);
                        }
                    });
                }
            } else {
                data.todos[selectedDateKey].splice(actionTargetIdx, 1);
            }
        } else if(type === 'edit') {
            const newText = prompt("수정할 내용을 입력하세요", currentTodo.text);
            if(newText) currentTodo.text = newText;
        } else if(type === 'tomorrow') {
            const [y, m, d] = selectedDateKey.split('-').map(Number);
            const next = new Date(y, m-1, d+1);
            const nextKey = `${next.getFullYear()}-${next.getMonth()+1}-${next.getDate()}`;
            const todo = data.todos[selectedDateKey].splice(actionTargetIdx, 1)[0];
            if(!data.todos[nextKey]) data.todos[nextKey] = [];
            data.todos[nextKey].push(todo);
            closeTodoPage();
        } else if(type === 'routine') {
            const dayOfWeek = new Date(selectedDateKey.replace(/-/g, '/')).getDay();
            const newRid = Date.now();
            data.routines.push({id: newRid, text: currentTodo.text, cat: currentTodo.cat, day: dayOfWeek});
            currentTodo.routineId = newRid;
        }
        save(); closeActionSheet();
    }

    function moveTodo(oldKey, idx, newKey) {
        const todo = data.todos[oldKey].splice(idx, 1)[0];
        if(!data.todos[newKey]) data.todos[newKey] = [];
        data.todos[newKey].push(todo);
        save();
    }

    function openActionSheet(idx) { 
        actionTargetIdx = idx; 
        const t = data.todos[selectedDateKey][idx];
        document.getElementById('routineBtn').style.display = t.routineId ? 'none' : 'flex';
        document.getElementById('actionSheet').classList.add('active'); 
        document.getElementById('actionOverlay').style.display = 'block'; 
    }
    function closeActionSheet() { document.getElementById('actionSheet').classList.remove('active'); document.getElementById('actionOverlay').style.display = 'none'; }
    function addTodo() { const val = document.getElementById('todoInput').value; if(!val) return; if(!data.todos[selectedDateKey]) data.todos[selectedDateKey] = []; data.todos[selectedDateKey].push({text: val, cat: CATEGORIES[selectedCatIdx].name, done: false}); document.getElementById('todoInput').value = ''; save(); }
    function toggleTodo(i) { data.todos[selectedDateKey][i].done = !data.todos[selectedDateKey][i].done; save(); }
    function save() { localStorage.setItem('gs_final_pro_v4', JSON.stringify(data)); renderTodos(); renderCalendar(); }
    function changeMonth(o) { currentMonth.setMonth(currentMonth.getMonth()+o); renderCalendar(); }

    renderCalendar();
</script>
</body>
</html>
